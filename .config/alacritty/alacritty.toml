[env]
COLORTERM = "truecolor"

[font]
size = 13

[window]
decorations = "Buttonless"
padding = { x = 9, y = 9 }

[colors.primary]
background = "#181818"
foreground = "#e4e4ef"

[colors.cursor]
text = "#181818"
cursor = "#ffdd33"

[colors.normal]
black   = "#181818"
red     = "#f43841"
green   = "#73c936"
yellow  = "#ffdd33"
blue    = "#96a6c8"
magenta = "#9e95c7"
cyan    = "#95a99f"
white   = "#e4e4ef"

[colors.bright]
black   = "#52494e"
red     = "#ff4f58"
green   = "#73c936"
yellow  = "#ffdd33"
blue    = "#96a6c8"
magenta = "#9e95c7"
cyan    = "#95a99f"
white   = "#f5f5f5"
