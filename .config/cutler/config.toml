# System Settings

[set.NSGlobalDomain]
NSAutoFillHeuristicControllerEnabled = false
"com.apple.keyboard.fnState" = false
NSWindowShouldDragOnGesture = true
InitialKeyRepeat = 15
KeyRepeat = 2
ApplePressAndHoldEnabled = false
NSAutomaticInlinePredictionEnabled = false
NSAutomaticSpellingCorrectionEnabled = false
NSDocumentSaveNewDocumentsToCloud = false

[set.dock]
tilesize = 60
autohide-delay = 0
autohide-time-modifier = 0.6
expose-group-apps = true
mineffect = "suck"
magnification = false
orientation = "right"
show-recents = false
autohide = true
static-only = true

[set.WindowManager]
StageManagerHideWidgets = true
StandardHideDesktopIcons = true
StandardHideWidgets = true
EnableTilingByEdgeDrag = false

[set.menuextra.clock]
FlashDateSeparators = true
Show24Hour = false
ShowAMPM = false
ShowDate = 1
ShowDayOfWeek = false
ShowSeconds = true

[set.AppleMultitouchTrackpad]
FirstClickThreshold = 0
TrackpadThreeFingerDrag = true

[set.HIToolbox]
AppleFnUsageType = 1

[set.finder]
FXDefaultSearchScope = "SCcf"
FXEnableExtensionChangeWarning = false
FXRemoveOldTrashItems = true
AppleShowAllFiles = true
ShowExternalHardDrivesOnDesktop = false
CreateDesktop = false
ShowPathbar = true

[set.screencapture]
show-thumbnail = false
target = "clipboard"
type = "png"

# Variable declarations
#
# NOTE: This is not exported to the rest of the environment *outside* of the program.

[vars]
hostname = "darkstar"

# External commands
#
# NOTE: Upgrade commands are non-flagged.

[command.dotfiles]
run = """
if [ ! -d ~/Developer/dotfiles ]; then
  git clone https://github.com/hitblast/dotfiles.git ~/Developer/dotfiles
fi
cd ~/Developer/dotfiles
git remote set-url origin hub:hitblast/dotfiles
stow . -t ~ --adopt
"""
ensure_first = true
required = [
    "stow",
    "git",
]
flag = true

[command.touchid]
run = """
sed "s/^#auth/auth/" /etc/pam.d/sudo_local.template | sudo tee /etc/pam.d/sudo_local
"""
flag = true

[command.uv]
run = """
uv tool install basedpyright
uv tool install ruff
uv tool install posting
uv tool install yt-dlp --with yt-dlp-ejs
"""
required = ["uv"]
flag = true

[command.hostname]
run = """
sudo scutil --set LocalHostName $hostname
sudo scutil --set HostName $hostname
sudo scutil --set ComputerName $hostname
"""
flag = true

[command.uv-upgrade]
run = "uv tool upgrade --all"
required = ["uv"]

[command.brew-upgrade]
run = "brew update && brew upgrade"
required = ["brew"]

# homebrew backup

[brew]
formulae = ["bash", "zola", "git", "cargo-edit", "ffmpeg", "mingw-w64", "jdtls", "zoxide", "lazygit", "yaml-language-server", "hitblast/tap/cornelli", "bash-language-server", "gradle", "vscode-langservers-extracted", "uv", "cmake", "sccache", "oven-sh/bun/bun", "libyaml", "fd", "tokei", "fastfetch", "machlit/tap/drs", "mpfr", "bat", "starship", "typst", "bash-completion@2", "mactop", "mdbook", "stow", "dust", "ninja", "ripgrep", "direnv", "fzf", "gh", "rbenv", "gmp"]
casks = ["spotify", "telegram", "vesktop", "gram", "localsend", "font-sf-pro", "whatsapp", "zulu@25", "cloudflare-warp", "transmission", "iina", "appcleaner", "helium-browser", "hot", "keepassxc", "android-platform-tools", "keyboardcleantool", "orbstack", "protonvpn", "slack", "ghostty", "nikitabobko/tap/aerospace"]
taps = ["machlit/tap", "nikitabobko/tap", "hitblast/tap", "oven-sh/bun"]
no_deps = true
